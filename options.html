<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Trace — Settings</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg-primary: #0a0a0f;
        --bg-secondary: #12121c;
        --bg-card: #16162a;
        --bg-card-hover: #1c1c35;
        --border: #2a2a45;
        --text-primary: #e2e8f0;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --accent: #8b5cf6;
        --accent-hover: #7c3aed;
        --accent-dim: rgba(139, 92, 246, 0.15);
        --success: #10b981;
        --error: #ef4444;
        --radius: 10px;
      }

      body {
        width: 380px;
        min-height: 280px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
      }

      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .header {
        padding: 16px 16px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header svg { width: 26px; height: 26px; flex-shrink: 0; }

      .title {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .subtitle {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 1px;
      }

      .body { padding: 14px 16px; }

      label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-secondary);
        margin: 14px 0 6px;
      }
      label:first-of-type { margin-top: 0; }

      .input {
        width: 100%;
        padding: 9px 11px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text-primary);
        font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
        font-size: 12px;
        outline: none;
        transition: border-color 0.15s;
      }
      .input:focus { border-color: var(--accent); }
      .input::placeholder { color: var(--text-muted); }

      .help {
        margin-top: 6px;
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.5;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 9px 14px;
        margin-top: 14px;
        border: none;
        border-radius: 8px;
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, transform 0.1s;
        background: var(--accent);
        color: white;
        width: 100%;
      }
      .btn:hover { background: var(--accent-hover); }
      .btn:active { transform: scale(0.98); }

      .status {
        margin-top: 10px;
        font-size: 12px;
        min-height: 16px;
        text-align: center;
      }
      .status.ok { color: var(--success); }
      .status.err { color: var(--error); }

      .footer {
        padding: 10px 16px;
        text-align: center;
        font-size: 10px;
        color: var(--text-muted);
        border-top: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <header class="header">
      <svg viewBox="0 0 624 624" fill="#8b5cf6" xmlns="http://www.w3.org/2000/svg">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M402.365 0C413.17 0.000231771 421.824 8.79229 422.858 19.5596C432.087 115.528 508.461 191.904 604.442 201.124C615.198 202.161 624 210.821 624 221.638V402.362C624 413.179 615.198 421.839 604.442 422.876C508.461 432.096 432.087 508.472 422.858 604.44C421.824 615.208 413.17 624 402.365 624H221.635C210.83 624 202.176 615.208 201.142 604.44C191.913 508.472 115.538 432.096 19.5576 422.876C8.80183 421.839 0 413.179 0 402.362V221.638C0 210.821 8.80183 202.161 19.5576 201.124C115.538 191.904 191.913 115.528 201.142 19.5596C202.176 8.79215 210.83 0 221.635 0H402.365ZM312 124C208.17 124 124 208.17 124 312C124 415.83 208.17 500 312 500C415.83 500 500 415.83 500 312C500 208.17 415.83 124 312 124Z"/>
      </svg>
      <div>
        <div class="title">Trace</div>
        <div class="subtitle">sketch any image · powered by fal.ai</div>
      </div>
    </header>

    <div class="body">
      <label for="key">fal.ai API key</label>
      <input id="key" class="input" type="password" placeholder="fal_..." autocomplete="off" />
      <div class="help">Get a key at <a href="https://fal.ai/dashboard/keys" target="_blank">fal.ai/dashboard/keys</a>. Stored locally in <code>chrome.storage.local</code> on this device only.</div>

      <button class="btn" id="save">Save</button>
      <div class="status" id="status"></div>
    </div>

    <footer class="footer">Right-click any image · Trace this image (sketch)</footer>

    <script src="options.js"></script>
  </body>
</html>
